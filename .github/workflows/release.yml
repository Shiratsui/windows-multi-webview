name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Version '$version' must look like 0.1.0 or 0.1.0-beta.1."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\MultiWebView\MultiWebView.csproj

      - name: Build
        run: dotnet build .\MultiWebView\MultiWebView.csproj --configuration Release --no-restore

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Version "${{ steps.version.outputs.version }}" -SelfContained

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $publishDir = "artifacts\publish\MultiWebView-$version-win-x64"
          $zipPath = "artifacts\MultiWebView-$version-win-x64-portable.zip"
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipPath -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Multi WebView ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/installer/*.exe
            artifacts/*.zip
